<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediCore | Reset Password</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background:
        radial-gradient(circle at top left, rgba(16,185,129,0.15), transparent),
        linear-gradient(180deg, #f8fafc, #eefbf6);
    }

    .glass {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.5);
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center text-slate-800">

<div id="root"></div>

<script type="text/babel">

const ResetPassword = () => {
  const [token, setToken] = React.useState("");
  const [email, setEmail] = React.useState("");
  const [newPassword, setNewPassword] = React.useState("");
  const [confirmPassword, setConfirmPassword] = React.useState("");
  const [message, setMessage] = React.useState("");
  const [error, setError] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [valid, setValid] = React.useState(false);

  // Get token + email from URL
  React.useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const urlToken = params.get("token");
    const urlEmail = params.get("email");

    if (!urlToken || !urlEmail) {
      setError("Invalid reset link.");
      return;
    }

    setToken(urlToken);
    setEmail(urlEmail);

    // Verify token
    fetch("/api/verify-reset-token", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ token: urlToken, email: urlEmail })
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        setValid(true);
      } else {
        setError(data.message);
      }
    })
    .catch(() => {
      setError("Server error.");
    });
  }, []);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError("");
    setMessage("");

    if (newPassword.length < 6) {
      return setError("Password must be at least 6 characters.");
    }

    if (newPassword !== confirmPassword) {
      return setError("Passwords do not match.");
    }

    setLoading(true);

    try {
      const res = await fetch("/api/reset-password", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          token,
          email,
          newPassword
        })
      });

      const data = await res.json();

      if (data.success) {
        setMessage("✅ Password reset successful! Redirecting...");
        setTimeout(() => {
          window.location.href = "login.html";
        }, 2000);
      } else {
        setError(data.message);
      }
    } catch {
      setError("Server error.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="glass rounded-3xl p-8 w-full max-w-md shadow-xl">

      <h1 className="text-3xl font-bold text-center mb-6">
        Reset Password
      </h1>

      {error && (
        <div className="bg-red-100 text-red-700 p-3 rounded-xl mb-4 text-sm">
          {error}
        </div>
      )}

      {message && (
        <div className="bg-green-100 text-green-700 p-3 rounded-xl mb-4 text-sm">
          {message}
        </div>
      )}

      {valid && (
        <form onSubmit={handleSubmit} className="space-y-4">

          <div>
            <label className="text-sm font-semibold">New Password</label>
            <input
              type="password"
              value={newPassword}
              onChange={(e)=>setNewPassword(e.target.value)}
              className="w-full mt-1 p-3 rounded-xl border"
              placeholder="Enter new password"
            />
          </div>

          <div>
            <label className="text-sm font-semibold">Confirm Password</label>
            <input
              type="password"
              value={confirmPassword}
              onChange={(e)=>setConfirmPassword(e.target.value)}
              className="w-full mt-1 p-3 rounded-xl border"
              placeholder="Confirm password"
            />
          </div>

          <button
            type="submit"
            disabled={loading}
            className="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold hover:bg-emerald-600 transition"
          >
            {loading ? "Resetting..." : "Reset Password"}
          </button>

        </form>
      )}

    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<ResetPassword />);

</script>
</body>
</html>
